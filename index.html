<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avalanche Cross-Chain - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Avalanche Cross-Chain DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://avalanche-cross-chain-bridge.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #f7f6f4;
  --bg-soft: #fbfaf8;
  --surface: #ffffff;
  --surface-muted: #f3f2ef;
  --ink: #171717;
  --muted: #68645f;
  --faint: #9a9690;
  --line: rgba(23, 23, 23, 0.1);
  --line-strong: rgba(23, 23, 23, 0.16);
  --accent: #E84142;
  --accent-soft: rgba(232, 65, 66, 0.1);
  --shadow: 0 28px 70px -38px rgba(23, 23, 23, 0.34);
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  min-height: 100dvh;
  height: 100dvh;
  margin: 0;
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 50% -20%, rgba(232, 65, 66, 0.1), transparent 38%),
    linear-gradient(180deg, var(--bg-soft), var(--bg));
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  display: flex;
  flex-direction: column;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 18px;
  min-height: 68px;
  padding: 16px clamp(18px, 4vw, 42px);
}

.brand {
  display: inline-flex;
  align-items: center;
  min-width: 0;
  gap: 10px;
  color: var(--ink);
  font-size: 1rem;
  font-weight: 760;
  line-height: 1;
  white-space: nowrap;
}

.brand img {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  box-shadow: 0 0 0 1px var(--line);
  flex: none;
}

.nav {
  display: flex;
  align-items: center;
  gap: 25px;
  margin-left: 8px;
}

.nav a {
  color: var(--muted);
  font-size: 0.93rem;
  font-weight: 560;
  line-height: 1;
  transition: color 140ms ease;
}

.nav a:hover {
  color: var(--accent);
}

.spacer {
  flex: 1;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 17px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.62);
  color: var(--ink);
  font-size: 0.9rem;
  font-weight: 720;
  white-space: nowrap;
  box-shadow: 0 8px 22px -18px rgba(23, 23, 23, 0.28);
  transition: border-color 140ms ease, color 140ms ease, transform 140ms ease;
}

.ghost:hover {
  color: var(--accent);
  border-color: rgba(232, 65, 66, 0.34);
  transform: translateY(-1px);
}

.stage {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 26px;
  width: 100%;
  padding: 12px clamp(18px, 4vw, 42px);
  text-align: center;
}

.hero {
  width: min(760px, 100%);
}

h1 {
  margin: 0;
  color: var(--ink);
  font-size: clamp(2.35rem, 6vw, 4.75rem);
  font-weight: 820;
  letter-spacing: 0;
  line-height: 1.02;
}

.sub {
  max-width: 58ch;
  margin: 15px auto 0;
  color: var(--muted);
  font-size: clamp(1rem, 1.55vw, 1.18rem);
  line-height: 1.55;
}

.sub strong {
  color: var(--ink);
  font-weight: 780;
  box-shadow: inset 0 -0.48em 0 var(--accent-soft);
}

.app-card {
  width: min(590px, 100%);
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.86);
  box-shadow: var(--shadow);
}

.route {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 44px minmax(0, 1fr);
  gap: 12px;
  align-items: center;
}

.leg {
  min-width: 0;
  padding: 15px 16px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface-muted);
  text-align: left;
}

.label {
  display: block;
  color: var(--faint);
  font-size: 0.72rem;
  font-weight: 780;
  letter-spacing: 0.08em;
  line-height: 1;
  text-transform: uppercase;
}

.chip {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  color: var(--ink);
  font-size: 1.08rem;
  font-weight: 800;
  line-height: 1.1;
}

.chip img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex: none;
  box-shadow: 0 0 0 1px rgba(23, 23, 23, 0.08);
}

.switch {
  width: 44px;
  height: 44px;
  padding: 0;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  display: grid;
  place-items: center;
  box-shadow: 0 10px 24px -20px rgba(23, 23, 23, 0.46);
  transition: color 140ms ease, border-color 140ms ease, background 140ms ease, transform 180ms ease;
}

.switch span {
  font-size: 1.28rem;
  line-height: 1;
}

.switch:hover {
  color: var(--accent);
  border-color: rgba(232, 65, 66, 0.38);
  background: var(--surface);
}

.switch.is-swapped {
  transform: rotate(180deg);
}

.primary {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 56px;
  margin-top: 16px;
  border-radius: 14px;
  background: var(--accent);
  color: #ffffff;
  font-size: 1.06rem;
  font-weight: 820;
  box-shadow: 0 16px 30px -22px rgba(232, 65, 66, 0.72);
  transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
}

.primary:hover {
  background: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 18px 34px -22px rgba(232, 65, 66, 0.84);
}

.foot {
  min-height: 50px;
  padding: 13px 24px 22px;
  color: var(--faint);
  font-size: 0.86rem;
  font-weight: 600;
  line-height: 1.2;
  text-align: center;
}

@media (max-width: 700px) {
  .nav {
    display: none;
  }
}

@media (max-width: 520px) {
  .topbar {
    min-height: 60px;
    gap: 10px;
    padding: 12px 14px;
  }

  .brand {
    gap: 8px;
    font-size: 0.9rem;
  }

  .brand img {
    width: 26px;
    height: 26px;
  }

  .ghost {
    min-height: 34px;
    padding: 0 12px;
    font-size: 0.84rem;
  }

  .stage {
    gap: 20px;
    padding: 8px 16px 10px;
  }

  h1 {
    font-size: clamp(2.16rem, 12vw, 2.75rem);
    line-height: 1.03;
  }

  .sub {
    margin-top: 12px;
    font-size: 0.98rem;
    line-height: 1.45;
  }

  .app-card {
    padding: 16px;
    border-radius: 18px;
  }

  .route {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .leg {
    padding: 13px 14px;
  }

  .chip {
    margin-top: 8px;
  }

  .switch {
    width: 40px;
    height: 40px;
    justify-self: center;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .primary {
    min-height: 52px;
    margin-top: 14px;
  }

  .foot {
    min-height: 42px;
    padding: 10px 18px 16px;
    font-size: 0.82rem;
  }
}

@media (max-height: 660px) {
  .topbar {
    min-height: 56px;
    padding-top: 10px;
    padding-bottom: 10px;
  }

  .stage {
    gap: 16px;
  }

  .sub {
    margin-top: 10px;
  }

  .app-card {
    padding: 16px;
  }

  .foot {
    min-height: 36px;
    padding-top: 8px;
    padding-bottom: 12px;
  }
}

  
  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Avalanche Cross-Chain</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Avalanche Cross-Chain</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Avalanche Cross-Chain &mdash; 2026</footer>
</body>
</html>
